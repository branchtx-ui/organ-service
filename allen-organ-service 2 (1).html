// ── Pure helpers ──────────────────────────────────────────────────────────────
function haverMiles(a, b) {
  const R = 3958.8;
  const dLat = ((b.lat - a.lat) * Math.PI) / 180;
  const dLng = ((b.lng - a.lng) * Math.PI) / 180;
  const s = Math.sin(dLat/2)**2 + Math.cos((a.lat*Math.PI)/180)*Math.cos((b.lat*Math.PI)/180)*Math.sin(dLng/2)**2;
  return Math.round(R * 2 * Math.atan2(Math.sqrt(s), Math.sqrt(1-s)));
}
function daysBetween(a, b) { return Math.round((new Date(b) - new Date(a)) / 86400000); }
function buildAppleMapsUrl(route) {
  // Apple Maps multi-stop: use lat,lng coordinates which are more reliable than addresses
  // Format: maps://?saddr=lat,lng&daddr=lat,lng&waypoints=lat,lng|lat,lng
  var stops = [HOME].concat(route).concat([HOME]);
  var saddr = HOME.lat + "," + HOME.lng;
  var daddr = stops[stops.length-1].lat + "," + stops[stops.length-1].lng;
  // Build waypoints (all stops except first and last)
  var waypoints = stops.slice(1, -1).map(function(s){ return s.lat + "," + s.lng; }).join("|");
  // Use maps:// scheme for native iOS app, fall back to https for desktop
  var base = "maps://?saddr=" + saddr + "&daddr=" + daddr + "&dirflg=d";
  if (waypoints) base += "&waypoints=" + encodeURIComponent(waypoints);
  return base;
}
function parseCSV(text) {
  const lines = text.split(/\r?\n/).filter(function(l){ return l.trim(); });
  if (lines.length < 2) return { headers:[], rows:[] };
  function parseLine(line) {
    var cells = [], cur = "", inQ = false;
    for (var i = 0; i < line.length; i++) {
      var ch = line[i];
      if (ch === '"') { if (inQ && line[i+1] === '"') { cur += '"'; i++; } else inQ = !inQ; }
      else if (ch === ',' && !inQ) { cells.push(cur.trim()); cur = ""; }
      else cur += ch;
    }
    cells.push(cur.trim());
    return cells;
  }
  var headers = parseLine(lines[0]).map(function(h){ return h.replace(/^"|"$/g, ""); });
  var rows = lines.slice(1).map(function(l) {
    var vals = parseLine(l), obj = {};
    headers.forEach(function(h, i){ obj[h] = vals[i] || ""; });
    return obj;
  }).filter(function(r){ return Object.values(r).some(function(v){ return v; }); });
  return { headers:headers, rows:rows };
}

// ── Persistent storage hook ──────────────────────────────────────────────────
function useLocalStorage(key, defaultValue) {
  var stored;
  try { stored = localStorage.getItem(key); } catch(e) { stored = null; }
  var parsed = null;
  if (stored) { try { parsed = JSON.parse(stored); } catch(e) { parsed = null; } }
  var initial = parsed !== null ? parsed : defaultValue;
  var pair = useState(initial);
  var value = pair[0];
  var setValue = pair[1];
  useEffect(function() {
    try { localStorage.setItem(key, JSON.stringify(value)); } catch(e) {}
  }, [key, value]);
  return [value, setValue];
}

    var safety = setTimeout(function() {
      if (!done) { done = true; callback(null, null); }

    // Try progressively simpler queries until one works

    } else {
      queries = [full, cityState];

    function tryNext(idx) {
      if (idx >= queries.length) {
        clearTimeout(safety);
        if (!done) { done = true; callback(null, null); }
        return;
      }
      var url = "https://maps.googleapis.com/maps/api/geocode/json?address=" + encodeURIComponent(queries[idx]) + "&key=" + GOOGLE_GEO_KEY;

        .then(function(r) { return r.json(); })
        .then(function(data) {
          if (done) return;

          } else {

        })
        .catch(function() {

    setEditForm({ name:c.name, contact:c.contact, phone:c.phone, email:c.email, address:c.address, city:c.city, state:c.state, organModel:c.organModel, serialNumber:c.serialNumber, speakers:c.speakers||"", speakers1:c.speakers1||"", speakers2:c.speakers2||"", datePurchased:c.datePurchased||"", warranty:c.warranty||"", installYear:c.installYear, nextService:c.nextService||"", tags:(c.tags||[]).join(", ") });
    setEditChurch(c);
  }
  function saveEdit() {
    if (!editForm.name || !editForm.organModel) { showToast("Name and model required", "error"); return; }
    var base = Object.assign({}, editChurch, editForm, { installYear:parseInt(editForm.installYear), tags:editForm.tags.split(",").map(function(t){ return t.trim(); }).filter(Boolean) });
    var addressChanged = editForm.address !== editChurch.address || editForm.city !== editChurch.city || editForm.state !== editChurch.state;
    if (addressChanged) {
      showToast("Updating address…");
      geocodeAddress(editForm.address, editForm.city, editForm.state, function(lat, lng) {
        var updated = Object.assign({}, base, { lat: lat || editChurch.lat, lng: lng || editChurch.lng });
        setChurches(function(cs){ return cs.map(function(c){ return c.id === editChurch.id ? updated : c; }); });
        if (selectedChurch && selectedChurch.id === editChurch.id) setSelectedChurch(updated);
        setEditChurch(null);
        showToast(updated.name + (lat ? " updated ✓" : " updated (address not found)"));
      });
    } else {
      setChurches(function(cs){ return cs.map(function(c){ return c.id === editChurch.id ? base : c; }); });
      if (selectedChurch && selectedChurch.id === editChurch.id) setSelectedChurch(base);
      setEditChurch(null); showToast(base.name + " updated");
    }
  }
  function deleteChurch(id) {
    setChurches(function(cs){ return cs.filter(function(c){ return c.id !== id; }); });
    setSelectedChurch(null);
    setShowAddVisit(false);
    setConfirmDelete(false);
    setDeleteTyped("");
    setEditChurch(null);
    showToast("Church deleted");
  }

  function handleImportFile(e) {
    var file = e.target.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(ev) {
      var parsed = parseCSV(ev.target.result);
      if (!parsed.headers.length) { showToast("Could not parse file", "error"); return; }
      setImportHeaders(parsed.headers);
      setImportRaw(parsed.rows);
      var autoMap = {};
      QB_FIELDS.forEach(function(f) {
        var match = parsed.headers.find(function(h){ return QB_AUTOMAP[h.toLowerCase()] === f.key; });
        if (match) autoMap[f.key] = match;
      });
      setImportMap(autoMap);
      setImportStep("map");
    };
    reader.readAsText(file);
  }
  function buildPreview() {
    var missing = QB_FIELDS.filter(function(f){ return f.required && !importMap[f.key]; });
    if (missing.length) { showToast("Map required field: " + missing[0].label, "error"); return; }
    function get(row, key) { return importMap[key] ? row[importMap[key]] || "" : ""; }
    var previews = importRaw.map(function(row, i) {
      var addr=get(row,"address"), city=get(row,"city"), state=get(row,"state")||"TX";
      return { id:Date.now()+i, name:get(row,"name"), contact:get(row,"contact"), phone:get(row,"phone"), email:get(row,"email"), address:addr, city:city, state:state, organModel:get(row,"organModel"), serialNumber:get(row,"serialNumber"), speakers:get(row,"speakers"), speakers1:get(row,"speakers1"), speakers2:get(row,"speakers2"), datePurchased:get(row,"datePurchased"), warranty:get(row,"warranty"), installYear:new Date().getFullYear(), nextService:"", serviceHistory:[], tags:[], lat:32.5+Math.random()*3.5, lng:-97.5-Math.random()*2, needsGeocode:true };
    }).filter(function(c){ return c.name.trim(); });
    var existingNames = new Set(churches.map(function(c){ return c.name.toLowerCase().trim(); }));
    var dupes = previews.filter(function(c){ return existingNames.has(c.name.toLowerCase().trim()); }).map(function(c){ return c.name; });
    setImportDupes(dupes); setImportPreview(previews); setImportStep("preview");
  }
  function confirmImport(skipDupes) {
    var toAdd = importPreview;
    if (skipDupes) {
      var existingNames = new Set(churches.map(function(c){ return c.name.toLowerCase().trim(); }));
      toAdd = importPreview.filter(function(c){ return !existingNames.has(c.name.toLowerCase().trim()); });
    }
    setChurches(function(cs){ return cs.concat(toAdd); });
    setShowImport(false); setImportStep("upload"); setImportRaw([]); setImportHeaders([]); setImportMap({}); setImportPreview([]); setImportDupes([]);
    showToast("Imported " + toAdd.length + " — geocoding addresses…");
    // Geocode each imported church with a delay to respect Nominatim rate limit (1/sec)
    toAdd.forEach(function(church, idx) {
      if (!church.needsGeocode || !church.address) return;
      setTimeout(function() {
        geocodeAddress(church.address, church.city, church.state, function(lat, lng) {
          if (lat) {
            setChurches(function(cs){ return cs.map(function(c){ return c.id === church.id ? Object.assign({},c,{lat:lat,lng:lng,needsGeocode:false}) : c; }); });
          }
        });
      }, idx * 1100);
    });
  }
  function resetImport() { setShowImport(false); setImportStep("upload"); setImportRaw([]); setImportHeaders([]); setImportMap({}); setImportPreview([]); setImportDupes([]); }

  // ── SCHEDULE TAB ─────────────────────────────────────────────────────────────

  // ── CHURCHES LIST TAB ────────────────────────────────────────────────────────
  function renderChurchList() {
    // Filter + sort pipeline
    var q = churchSearch.toLowerCase().trim();
    var list = enriched.filter(function(c) {
      if (churchFilter !== "all" && c.state !== churchFilter) return false;
      if (!q) return true;
      return (c.name + c.city + c.state + c.organModel + c.contact).toLowerCase().indexOf(q) !== -1;
    });
    if (churchSort === "name")     list = list.slice().sort(function(a,b){ return a.name.localeCompare(b.name); });
    if (churchSort === "urgency")  list = list.slice().sort(function(a,b){ return a.daysUntil - b.daysUntil; });
    if (churchSort === "distance") list = list.slice().sort(function(a,b){ return b.distFromHome - a.distFromHome; });
    if (churchSort === "state")    list = list.slice().sort(function(a,b){ return a.state.localeCompare(b.state) || a.name.localeCompare(b.name); });

    // A-Z letter index (only when sorted by name and no search)
    var letters = [];
    if (churchSort === "name" && !q) {
      var seen = {};
      list.forEach(function(c) {
        var l = c.name[0].toUpperCase();
        if (!seen[l]) { seen[l] = true; letters.push(l); }
      });
    }

    // Scroll to letter section
    function scrollToLetter(l) {
      setJumpLetter(l);
      setTimeout(function(){ setJumpLetter(null); }, 800);

    return (
      <div>

          </div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={function(){ setShowImport(true); setImportStep("upload"); }} style={{padding:"9px 12px",background:"#1e3a2f",border:"1px solid #2a4a35",color:"#c9a84c",borderRadius:9,fontWeight:700,cursor:"pointer",fontFamily:"Georgia,serif",fontSize:13}}>⬆ QB</button>
            <button onClick={function(){ setShowNewChurch(true); }} style={{padding:"9px 14px",background:"linear-gradient(135deg,#c9a84c,#8b6914)",color:"#0a1018",border:"none",borderRadius:9,fontWeight:700,cursor:"pointer",fontFamily:"Georgia,serif",fontSize:13}}>+ Add</button>
          </div>
        </div>

        {/* Search bar */}
        <div style={{position:"relative",marginBottom:10}}>
          <span style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",fontSize:16,color:"#3a6a45",pointerEvents:"none"}}>🔍</span>
          <input
            type="search"
            value={churchSearch}
            onChange={function(e){ setChurchSearch(e.target.value); }}
            placeholder="Search churches, city, model…"
            style={{width:"100%",background:"#0d1a10",border:"1px solid #2a4a35",borderRadius:10,padding:"11px 12px 11px 38px",color:"#e8dcc8",fontFamily:"Georgia,serif",fontSize:15,boxSizing:"border-box",WebkitAppearance:"none"}}
          />
          {churchSearch && (
            <button onClick={function(){ setChurchSearch(""); }} style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",background:"transparent",border:"none",color:"#5a8a65",fontSize:18,cursor:"pointer",padding:"0 4px",lineHeight:1}}>×</button>
          )}
        </div>

        {/* Sort + Filter pills */}
        <div style={{display:"flex",gap:6,marginBottom:12,overflowX:"auto",paddingBottom:4,WebkitOverflowScrolling:"touch"}}>
          {[["name","A–Z"],["urgency","Urgent"],["distance","Distance"],["state","State"]].map(function(pair) {
            var active = churchSort === pair[0];
            return (
              <button key={pair[0]} onClick={function(){ setChurchSort(pair[0]); }}
                style={{flexShrink:0,padding:"6px 14px",borderRadius:20,border:"1px solid "+(active?"#c9a84c":"#2a4a35"),background:active?"#c9a84c22":"transparent",color:active?"#c9a84c":"#5a8a65",fontFamily:"Georgia,serif",fontSize:12,cursor:"pointer",whiteSpace:"nowrap"}}>
                {pair[1]}
              </button>
            );
          })}
          <div style={{width:1,background:"#2a4a35",margin:"0 2px",flexShrink:0}}/>
          {[["all","All"],["TX","TX"],["OK","OK"]].map(function(pair) {
            var active = churchFilter === pair[0];
            return (
              <button key={pair[0]} onClick={function(){ setChurchFilter(pair[0]); }}
                style={{flexShrink:0,padding:"6px 14px",borderRadius:20,border:"1px solid "+(active?"#4caf7d":"#2a4a35"),background:active?"#4caf7d22":"transparent",color:active?"#4caf7d":"#5a8a65",fontFamily:"Georgia,serif",fontSize:12,cursor:"pointer"}}>
                {pair[1]}
              </button>
            );
          })}
        </div>

        {/* A-Z quick-jump strip (only in name sort, no search) */}
        {letters.length > 0 && (
          <div style={{display:"flex",flexWrap:"wrap",gap:4,marginBottom:12}}>
            {letters.map(function(l) {
              return (
                <button key={l} onClick={function(){ scrollToLetter(l); }}
                  style={{width:28,height:28,borderRadius:6,border:"1px solid #2a4a35",background:jumpLetter===l?"#c9a84c":"#1a2e1e",color:jumpLetter===l?"#0a1018":"#6b8f71",fontFamily:"Georgia,serif",fontSize:12,fontWeight:700,cursor:"pointer",padding:0,lineHeight:"28px",textAlign:"center"}}>
                  {l}
                </button>
              );
            })}
          </div>
        )}

        {/* No results */}
        {list.length === 0 && (
          <div style={{textAlign:"center",padding:"40px 0",color:"#2a4a35",fontSize:14}}>
            No churches match "{churchSearch}"
          </div>
        )}

        {/* Church cards */}
        {list.map(function(c) {
          var pc = PC[c.computedPriority];
          var showHeader = false;
          if (churchSort === "name" && !q) {
            var l = c.name[0].toUpperCase();
            if (l !== lastLetter) { lastLetter = l; showHeader = true; }
          }
          return (
            <div key={c.id}>
              {showHeader && (
                <div id={"letter-" + c.name[0].toUpperCase()} style={{fontSize:11,letterSpacing:"2px",textTransform:"uppercase",color:"#c9a84c",padding:"10px 0 4px",fontWeight:700}}>

                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:15,fontWeight:700,color:"#e8dcc8",lineHeight:1.3}}>{c.name}</div>
                    <div style={{fontSize:12,color:"#5a8a65",marginTop:2}}>{c.city}, {c.state} · <span style={{color:"#c9a84c"}}>{c.distFromHome} mi</span></div>
                    <div style={{fontSize:12,color:"#5a8a65",marginTop:3}}>{c.organModel} · <span style={{color:"#8ab88a"}}>Last: {c.lastService || "no visits yet"}</span></div>
                  </div>
                  <button onClick={function(e){ openEdit(c, e); }} style={{marginLeft:10,padding:"6px 11px",background:"#1e3a2f",border:"1px solid #2a4a35",borderRadius:7,color:"#c9a84c",cursor:"pointer",fontFamily:"inherit",fontSize:12,flexShrink:0}}>✏️</button>
                </div>
                <div style={{display:"flex",gap:6,marginTop:10,flexWrap:"wrap"}}>
                  {WEEK_DAYS.map(function(d) {
                    return (
                      <button key={d} onClick={function(e){ e.stopPropagation(); addToDay(d, c); }}
                        style={{fontSize:11,padding:"5px 10px",borderRadius:6,border:"1px solid #2a4a35",background:"#1a2e1e",color:"#6b8f71",cursor:"pointer",fontFamily:"inherit"}}>+{d}</button>
                    );
                  })}
                </div>
              </div>
            </div>
          );
        })}
      </div>
    );
  }

                  </div>

              <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",background:"#0d1a10",border:"1px solid #1e3a2f",borderRadius:12,marginTop:14,overflow:"hidden"}}>
                {(function(){

                      <div style={{fontSize:20,color:"#c9a84c",fontWeight:700,marginTop:4}}>{pair[1]}</div>
                    </div>

                <svg width="20" height="20" viewBox="0 0 56 56" fill="none"><rect width="56" height="56" rx="12" fill="white"/><path d="M28 8C17 8 8 17 8 28s9 20 20 20 20-9 20-20S39 8 28 8z" fill="#1c7de8"/><path d="M28 14l3.5 8.5H40l-7 5 2.5 8.5L28 31l-7.5 5 2.5-8.5-7-5h8.5L28 14z" fill="white"/></svg>

              </div>

            </div>

        })()}
      </div>

      <div>
        <div style={{fontSize:13,color:"#8ab88a",marginBottom:4}}><strong style={{color:"#c9a84c"}}>{importPreview.length} churches</strong> ready to import</div>
        {importDupes.length > 0 && <div style={{background:"rgba(250,173,20,.1)",border:"1px solid #faad1444",borderRadius:8,padding:"10px 12px",marginBottom:12,fontSize:12,color:"#ffc53d"}}>⚠ {importDupes.length} duplicate{importDupes.length>1?"s":""}: {importDupes.join(", ")}</div>}
        <div style={{maxHeight:240,overflowY:"auto",marginBottom:14}}>
          {importPreview.map(function(c, i) {
            var isDupe = importDupes.indexOf(c.name) !== -1;
            return (
              <div key={i} style={{background:isDupe?"rgba(250,173,20,.07)":"#081208",border:"1px solid "+(isDupe?"#faad1444":"#1e3a2f"),borderRadius:9,padding:"10px 12px",marginBottom:6}}>
                <div style={{fontSize:13,fontWeight:700,color:isDupe?"#ffc53d":"#e8dcc8"}}>{c.name}{isDupe?" ⚠ duplicate":""}</div>
                <div style={{fontSize:11,color:"#5a8a65",marginTop:2}}>{[c.contact, c.city&&c.state?c.city+", "+c.state:c.city||c.state, c.phone].filter(Boolean).join(" · ") || "(no extra details)"}</div>
              </div>
            );
          })}
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {importDupes.length > 0 && <button onClick={function(){ confirmImport(true); }} style={goldBtn}>Import {importPreview.length - importDupes.length} New (skip duplicates)</button>}
          <button onClick={function(){ confirmImport(false); }} style={importDupes.length > 0 ? ghostBtn : goldBtn}>Import All {importPreview.length}</button>
          <button onClick={function(){ setImportStep("map"); }} style={ghostBtn}>← Back to Mapping</button>
        </div>
      </div>
    );

    return null;
  }

  // ── SETTINGS TAB ─────────────────────────────────────────────────────────────
  function renderSettings() {
    var canClear = clearTyped.trim().toLowerCase() === "yes";

    function clearAll() {
      if (!canClear) return;
      setChurches(SEED_CHURCHES);
      setSchedule({Mon:[],Tue:[],Wed:[],Thu:[],Fri:[],Sat:[]});
      setMileageLogs([]);
      setClearTyped("");
      try { localStorage.removeItem("aos_churches"); localStorage.removeItem("aos_schedule"); localStorage.removeItem("aos_mileage"); } catch(e){}
      showToast("All data cleared");
    }

    function exportBackup() {
      var backup = {
        version: 1,
        exportedAt: new Date().toISOString(),
        churches: churches,
        schedule: schedule,
        mileageLogs: mileageLogs,
      };
      var json = JSON.stringify(backup, null, 2);
      var blob = new Blob([json], { type: "application/json" });
      var url = URL.createObjectURL(blob);
      var a = document.createElement("a");
      var date = new Date().toISOString().slice(0,10);
      a.href = url;
      a.download = "organ-service-backup-" + date + ".json";
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      showToast("Backup downloaded");
    }

    function handleRestoreFile(e) {
      var file = e.target.files[0];
      if (!file) return;
      setRestoreError("");
      var reader = new FileReader();
      reader.onload = function(ev) {
        try {
          var data = JSON.parse(ev.target.result);
          if (!data.churches || !Array.isArray(data.churches)) {
            setRestoreError("Invalid backup file — churches data not found.");
            return;
          }
          if (data.churches) setChurches(data.churches);
          if (data.schedule) setSchedule(data.schedule);
          if (data.mileageLogs) setMileageLogs(data.mileageLogs);
          var d = data.exportedAt ? data.exportedAt.slice(0,10) : "unknown date";
          showToast("Restored " + data.churches.length + " churches from " + d);
        } catch(err) {
          setRestoreError("Could not read file. Make sure it is a valid backup .json file.");
        }
      };
      reader.readAsText(file);
      e.target.value = "";
    }

    return (
      <div>
        <div style={{marginBottom:24}}>
          <div style={{fontSize:20,fontWeight:700,color:"#c9a84c"}}>Settings</div>
          <div style={{fontSize:12,color:"#5a8a65",marginTop:2}}>App configuration &amp; data management</div>
        </div>

        {/* Backup & Restore */}
        <div style={{background:"#0d1a10",border:"1px solid #1e3a2f",borderRadius:14,padding:"14px 16px",marginBottom:14}}>
          <SectionLabel>Backup &amp; Restore</SectionLabel>
          <div style={{fontSize:13,color:"#8ab88a",marginBottom:6,lineHeight:1.6}}>
            📋 <strong>Back up regularly</strong> — deleting the app from your home screen erases all data. Export first and save the file to iCloud Drive, Files, or email it to yourself.
          </div>
          <div style={{fontSize:12,color:"#5a8a65",marginBottom:16,lineHeight:1.5}}>
            Backup includes all {churches.length} churches, service history, schedule, and {mileageLogs.length} mileage trips.
          </div>

          {/* Export */}
          <button
            onClick={exportBackup}
            style={{display:"block",width:"100%",padding:"14px",background:"linear-gradient(135deg,#c9a84c,#8b6914)",color:"#0a1018",border:"none",borderRadius:10,fontWeight:700,cursor:"pointer",fontFamily:"Georgia,serif",fontSize:15,textAlign:"center",marginBottom:10}}>
            ⬇ Download Backup
          </button>

          {/* Restore */}
          <div style={{borderTop:"1px solid #1e3a2f",paddingTop:14,marginTop:4}}>
            <div style={{fontSize:12,color:"#5a8a65",marginBottom:10,lineHeight:1.5}}>
              To restore, select a previously downloaded backup file. <strong style={{color:"#ffc53d"}}>This will overwrite your current data.</strong>
            </div>
            {restoreError && (
              <div style={{background:"rgba(139,26,26,0.2)",border:"1px solid #8b1a1a",borderRadius:8,padding:"10px 12px",marginBottom:10,fontSize:12,color:"#ff9999"}}>
                ⚠ {restoreError}
              </div>
            )}
            <label style={{display:"block",width:"100%",padding:"13px",background:"transparent",color:"#6b8f71",border:"1px solid #2a4a35",borderRadius:10,fontWeight:700,cursor:"pointer",fontFamily:"Georgia,serif",fontSize:15,textAlign:"center",boxSizing:"border-box"}}>
              ⬆ Restore from Backup
              <input type="file" accept=".json" onChange={handleRestoreFile} style={{display:"none"}}/>
            </label>
          </div>
        </div>

        {/* App info */}
        <div style={{background:"#0d1a10",border:"1px solid #1e3a2f",borderRadius:14,padding:"14px 16px",marginBottom:14}}>
          <SectionLabel>About</SectionLabel>
          <div style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:"1px solid #132010"}}>
            <span style={{fontSize:13,color:"#5a8a65"}}>App</span>
            <span style={{fontSize:13,color:"#d4c8a8"}}>Allen Organ Service</span>
          </div>
          <div style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:"1px solid #132010"}}>
            <span style={{fontSize:13,color:"#5a8a65"}}>Territory</span>
            <span style={{fontSize:13,color:"#d4c8a8"}}>Texas &amp; Oklahoma</span>
          </div>
          <div style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:"1px solid #132010"}}>
            <span style={{fontSize:13,color:"#5a8a65"}}>Home Base</span>
            <span style={{fontSize:13,color:"#d4c8a8"}}>Lewisville, TX</span>
          </div>
          <div style={{display:"flex",justifyContent:"space-between",padding:"8px 0"}}>
            <span style={{fontSize:13,color:"#5a8a65"}}>Mileage Rate</span>
            <span style={{fontSize:13,color:"#d4c8a8"}}>${IRS_RATE}/mi (IRS 2025)</span>
          </div>
        </div>

        {/* Storage summary */}
        <div style={{background:"#0d1a10",border:"1px solid #1e3a2f",borderRadius:14,padding:"14px 16px",marginBottom:14}}>
          <SectionLabel>Stored Data</SectionLabel>
          <div style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:"1px solid #132010"}}>
            <span style={{fontSize:13,color:"#5a8a65"}}>Churches</span>
            <span style={{fontSize:13,color:"#c9a84c",fontWeight:700}}>{churches.length} records</span>
          </div>
          <div style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:"1px solid #132010"}}>
            <span style={{fontSize:13,color:"#5a8a65"}}>Scheduled Stops</span>
            <span style={{fontSize:13,color:"#c9a84c",fontWeight:700}}>{Object.values(schedule).reduce(function(s,d){ return s+d.length; },0)} this week</span>
          </div>
          <div style={{display:"flex",justifyContent:"space-between",padding:"8px 0"}}>
            <span style={{fontSize:13,color:"#5a8a65"}}>Mileage Trips</span>
            <span style={{fontSize:13,color:"#c9a84c",fontWeight:700}}>{mileageLogs.length} logged</span>
          </div>
        </div>

        {/* Re-geocode */}
        <div style={{background:"#0d1a10",border:"1px solid #1e3a2f",borderRadius:14,padding:"14px 16px",marginBottom:14}}>
          <SectionLabel>Fix Distances</SectionLabel>
          <div style={{fontSize:13,color:"#8ab88a",marginBottom:12,lineHeight:1.6}}>
            Looks up real GPS coordinates for every church using their street address. Required for accurate driving distances. At 1 address/sec, {churches.length} churches takes ~{Math.round(churches.length/60)} minutes. Progress saves as it goes — you can pause and resume anytime.
          </div>

          {/* Progress bar */}
          {(geoRunning || geoDone > 0) && (
            <div style={{marginBottom:14}}>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:6}}>
                <span style={{color:"#c9a84c",fontWeight:700}}>{geoDone} / {geoTotal} addresses</span>
                <span style={{color:geoFailed>0?"#ff9999":"#5a8a65"}}>{geoFailed > 0 ? geoFailed+" not found" : (geoRunning ? "running…" : "complete ✓")}</span>
              </div>
              <div style={{width:"100%",height:10,background:"#1a2e1a",borderRadius:5,overflow:"hidden"}}>
                <div style={{height:"100%",borderRadius:5,background:"linear-gradient(90deg,#c9a84c,#8b6914)",width:(geoTotal>0?Math.round(geoDone/geoTotal*100):0)+"%",transition:"width 0.4s"}}/>
              </div>
              <div style={{fontSize:11,color:"#5a8a65",marginTop:5}}>
                {geoRunning && geoTotal > 0 && "Est. " + Math.round((geoTotal-geoDone)/60) + " min remaining"}
                {!geoRunning && geoDone === geoTotal && geoDone > 0 && "All done! Rebuild your route for accurate distances."}
              </div>
            </div>
          )}

          {/* Buttons */}
          <div style={{display:"flex",gap:8}}>
            {!geoRunning && (
              <button onClick={function(){
                var toProcess = churches.filter(function(c){ return c.address; });
                var startIdx = geoDone < geoTotal && geoTotal > 0 ? geoDone : 0;
                if (startIdx === 0) { setGeoDone(0); setGeoFailed(0); setGeoTotal(toProcess.length); }
                setGeoRunning(true);
                setGeoPaused(false);
                var idx = startIdx;
                function processNext() {
                  if (idx >= toProcess.length) {
                    setGeoRunning(false);
                    showToast("Geocoding complete ✓");
                    return;
                  }
                  var church = toProcess[idx];
                  idx++;
                  // Advance counter and schedule next tick BEFORE the fetch,
                  // so a failed/slow lookup never blocks the chain
                  var ref = setTimeout(function() {
                    setGeoDone(function(d){ return d+1; });
                    processNext();
                  }, 300);
                  setGeoTimerRef(ref);
                  geocodeAddress(church.address, church.city, church.state, function(lat, lng) {
                    if (lat) {
                      setChurches(function(cs){ return cs.map(function(c){ return c.id===church.id ? Object.assign({},c,{lat:lat,lng:lng}) : c; }); });
                    } else {
                      setGeoFailed(function(f){ return f+1; });
                    }
                  });
                }
                processNext();
              }} style={{flex:1,padding:"13px",background:"#1e3a2f",color:"#c9a84c",border:"1px solid #2a4a35",borderRadius:10,fontWeight:700,cursor:"pointer",fontFamily:"Georgia,serif",fontSize:14,textAlign:"center"}}>
                {geoDone > 0 && geoDone < geoTotal ? "▶ Resume" : "📍 Start Geocoding"}
              </button>
            )}
            {geoRunning && (
              <button onClick={function(){
                if (geoTimerRef) clearTimeout(geoTimerRef);
                setGeoRunning(false);
                setGeoPaused(true);
                showToast("Paused at " + geoDone + " / " + geoTotal);
              }} style={{flex:1,padding:"13px",background:"#2a1a08",color:"#ffc53d",border:"1px solid #5a3a08",borderRadius:10,fontWeight:700,cursor:"pointer",fontFamily:"Georgia,serif",fontSize:14,textAlign:"center"}}>
                ⏸ Pause
              </button>
            )}
            {geoDone > 0 && !geoRunning && (
              <button onClick={function(){ setGeeDone(0); setGeoTotal(0); setGeoFailed(0); setGeoPaused(false); }} style={{padding:"13px 16px",background:"transparent",color:"#5a8a65",border:"1px solid #2a4a35",borderRadius:10,cursor:"pointer",fontFamily:"Georgia,serif",fontSize:13}}>
                Reset
              </button>
            )}
          </div>
        </div>

        {/* Danger zone */}
        <div style={{background:"rgba(139,26,26,0.1)",border:"1px solid #5a1a1a",borderRadius:14,padding:"14px 16px",marginBottom:14}}>
          <div style={{fontSize:10,letterSpacing:"2px",textTransform:"uppercase",color:"#ff6b6b",marginBottom:10,paddingBottom:6,borderBottom:"1px solid #3a1010"}}>Danger Zone</div>
          <div style={{fontSize:13,color:"#a06060",marginBottom:14,lineHeight:1.6}}>
            Clears all churches, service history, schedule, and mileage logs. Resets to the 5 sample churches. Type <strong style={{color:"#ff6b6b"}}>yes</strong> to enable.
          </div>
          <input
            value={clearTyped}
            onChange={function(e){ setClearTyped(e.target.value); }}
            placeholder="type yes to enable"
            autoCapitalize="none"
            style={{width:"100%",background:"#1a0808",border:"1px solid "+(canClear?"#ff4d4f":"#5a1a1a"),borderRadius:8,padding:"10px 12px",color:"#ff9999",fontFamily:"Georgia,serif",fontSize:15,boxSizing:"border-box",marginBottom:12,WebkitAppearance:"none"}}
          />
          <button
            onClick={clearAll}
            disabled={!canClear}
            style={{display:"block",width:"100%",padding:"13px",background:canClear?"#8b1a1a":"#1a0a0a",color:canClear?"#fff":"#4a2020",border:"1px solid "+(canClear?"#8b1a1a":"#3a1010"),borderRadius:10,fontWeight:700,cursor:canClear?"pointer":"not-allowed",fontFamily:"Georgia,serif",fontSize:15,textAlign:"center",transition:"all .2s"}}>
            🗑 Clear All Data
          </button>
        </div>
      </div>
    );
  }

  // ── RENDER ────────────────────────────────────────────────────────────────────
  return (
    <div style={{fontFamily:"Georgia,'Times New Roman',serif",minHeight:"100vh",background:"#0a1410",color:"#e8dcc8",paddingBottom:80}}>

      {toast && (
        <div style={{position:"fixed",top:16,left:"50%",transform:"translateX(-50%)",zIndex:9999,background:toast.type==="error"?"#8b1a1a":"#1a4a2e",border:"1px solid "+(toast.type==="error"?"#ff6b6b":"#4caf7d"),color:"#fff",padding:"10px 20px",borderRadius:20,fontSize:13,boxShadow:"0 4px 20px rgba(0,0,0,.5)",whiteSpace:"nowrap"}}>
          {toast.msg}
        </div>
      )}

      <div style={{position:"sticky",top:0,zIndex:100,overflow:"hidden",borderBottom:"1px solid #2a4a20"}}>
        {/* Organ pipes SVG — very tall, full safe-area coverage */}
        <svg style={{position:"absolute",inset:0,width:"100%",height:"100%",opacity:0.26,pointerEvents:"none"}} viewBox="0 0 400 140" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
          <rect width="400" height="220" fill="#061008"/>
          {[
            [2,4,18,108],[22,4,15,116],[39,4,13,120],[54,4,12,124],[67,4,10,128],
            [79,4,11,126],[91,4,13,120],[106,4,15,116],[123,4,18,108],
            [144,4,23,90],[168,4,28,72],[196,4,36,52],[230,4,28,72],
            [258,4,23,90],[282,4,18,108],[302,4,15,116],[319,4,13,120],
            [334,4,12,124],[348,4,10,128],[360,4,11,126],[373,4,13,120],[388,4,15,116]
          ].map(function(p,i){
            var x=p[0], y=p[1], w=p[2], h=p[3];
            var shade = i % 3 === 0 ? "#c9a84c" : i % 3 === 1 ? "#8b6914" : "#a07828";
            return (
              <g key={i}>
                <rect x={x} y={y} width={w} height={h} rx="2" fill={shade}/>
                <rect x={x+2} y={y+2} width={Math.max(2,w-4)} height={h-4} rx="1" fill="rgba(255,240,160,0.13)"/>
                <rect x={x} y={y+h*0.38} width={w} height={h*0.07} fill="rgba(0,0,0,0.5)"/>
                <rect x={x+w*0.25} y={y+h} width={w*0.5} height={140-(y+h)} fill={shade} opacity="0.3"/>
              </g>
            );
          })}
          <rect width="400" height="140" fill="url(#hdr-grad)"/>
          <defs>
            <linearGradient id="hdr-grad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stopColor="#061008" stopOpacity="0.05"/>
              <stop offset="45%" stopColor="#061008" stopOpacity="0.4"/>
              <stop offset="100%" stopColor="#061008" stopOpacity="0.92"/>
            </linearGradient>
          </defs>
        </svg>

        {/* Foreground — generous padding clears Dynamic Island + breathing room */}
        <div style={{
          position:"relative",
          paddingTop:"calc(env(safe-area-inset-top) + 4px)",
          paddingBottom:10,
          paddingLeft:22,
          paddingRight:22,
          background:"linear-gradient(180deg,rgba(6,16,8,0.0) 0%,rgba(6,16,8,0.55) 100%)"
        }}>
          <div style={{display:"flex",alignItems:"center",gap:20}}>
            {/* Icon */}
            <div style={{width:72,height:72,flexShrink:0}}>
              <svg viewBox="0 0 38 38" fill="none" xmlns="http://www.w3.org/2000/svg" style={{width:"100%",height:"100%",filter:"drop-shadow(0 4px 10px rgba(0,0,0,0.8))"}}>
                <rect width="38" height="38" rx="9" fill="url(#icon-g)"/>
                <rect x="7"  y="10" width="5" height="20" rx="1.5" fill="rgba(255,255,200,0.9)"/>
                <rect x="14" y="7"  width="5" height="23" rx="1.5" fill="rgba(255,255,200,0.9)"/>
                <rect x="21" y="10" width="5" height="20" rx="1.5" fill="rgba(255,255,200,0.9)"/>
                <rect x="28" y="13" width="4" height="17" rx="1.5" fill="rgba(255,255,200,0.75)"/>
                <rect x="7"  y="20" width="5" height="2" fill="rgba(0,0,0,0.4)"/>
                <rect x="14" y="18" width="5" height="2" fill="rgba(0,0,0,0.4)"/>
                <rect x="21" y="20" width="5" height="2" fill="rgba(0,0,0,0.4)"/>
                <defs>
                  <linearGradient id="icon-g" x1="0" y1="0" x2="38" y2="38">
                    <stop offset="0%" stopColor="#e0b84e"/>
                    <stop offset="100%" stopColor="#7a5510"/>
                  </linearGradient>
                </defs>
              </svg>
            </div>
            <div>
              <div style={{fontWeight:700,fontSize:22,color:"#f5ead4",lineHeight:1.05,letterSpacing:"0px",textShadow:"0 3px 18px rgba(0,0,0,0.95)"}}>Allen Organ Service</div>
              <div style={{fontSize:13,color:"#c9a84c",letterSpacing:"3.5px",textTransform:"uppercase",marginTop:8,textShadow:"0 1px 8px rgba(0,0,0,0.9)"}}>Texas &amp; Oklahoma · Lewisville</div>
            </div>
          </div>
        </div>
      </div>

      <div style={{padding:"16px 16px 0"}}>
        {tab === "schedule" && renderSchedule()}
        {tab === "churches" && !selectedChurch && renderChurchList()}
        {tab === "churches" && selectedChurch && renderChurchDetail()}
        {tab === "route" && renderRoute()}
        {tab === "mileage" && renderMileage()}
        {tab === "settings" && renderSettings()}
      </div>

      <div style={{position:"fixed",bottom:0,left:0,right:0,background:"#0d1a10",borderTop:"1px solid #1e3a2f",display:"flex",zIndex:200,paddingBottom:"env(safe-area-inset-bottom)"}}>
        {[["schedule","📅","Schedule"],["churches","⛪","Churches"],["route","🗺","Route"],["mileage","🚗","Mileage"],["settings","⚙️","Settings"]].map(function(item) {
          var id=item[0], icon=item[1], label=item[2];
          return (
            <button key={id} onClick={function(){ setTab(id); if(id!=="churches") setSelectedChurch(null); }} style={{flex:1,padding:"10px 4px 8px",background:"transparent",border:"none",cursor:"pointer",fontFamily:"inherit",display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
              <span style={{fontSize:20}}>{icon}</span>
              <span style={{fontSize:10,letterSpacing:".5px",color:tab===id?"#c9a84c":"#4a6a50",fontWeight:tab===id?700:400,textTransform:"uppercase"}}>{label}</span>
              {tab===id && <div style={{width:20,height:2,background:"#c9a84c",borderRadius:1,marginTop:1}}/>}
            </button>
          );
        })}
      </div>

      {editChurch && <BottomModal onClose={function(){ setEditChurch(null); setConfirmDelete(false); setDeleteTyped(""); }} title="Edit Church" subtitle={editChurch.name}>{renderEditFields()}</BottomModal>}
      {showNewChurch && <BottomModal onClose={function(){ setShowNewChurch(false); }} title="Add New Church">{renderAddChurchFields()}</BottomModal>}
      {showImport && <BottomModal onClose={resetImport} title="Import from QuickBooks" subtitle="Supports QB Customer Export (.csv)">{renderImportContent()}</BottomModal>}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
  </script>
</body>
</html>
